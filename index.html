<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSCE Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .page-container {
      width: 100%;
      max-width: 500px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    #chatbot-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      height: 600px;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      margin-bottom: 5px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-content {
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .user-message {
      justify-content: flex-end;
    }

    .user-message .message-content {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot-message {
      justify-content: flex-start;
    }

    .bot-message .message-content {
      background: #e9ecef;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .bot-typing {
      display: flex;
      gap: 4px;
    }

    .bot-typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #667eea;
      animation: typing 1.4s infinite;
    }

    .bot-typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .bot-typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.5;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    #input-area {
      display: flex;
      padding: 15px;
      border-top: 1px solid #e9ecef;
      background: white;
      gap: 8px;
    }

    #userInput {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e9ecef;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    #userInput:focus {
      border-color: #667eea;
    }

    #userInput::placeholder {
      color: #999;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Scrollbar styling */
    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-track {
      background: #f8f9fa;
    }

    #messages::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    #messages::-webkit-scrollbar-thumb:hover {
      background: #999;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="header">
      <h1>RSCE Assistant</h1>
      <p>How can we help you today?</p>
    </div>

    <div id="chatbot-container">
      <div id="messages"></div>
      <div id="input-area">
        <input 
          type="text" 
          id="userInput" 
          placeholder="Ask a question..."
          autocomplete="off"
        >
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/chat';
    let isWaitingForResponse = false;

    async function sendMessage() {
      if (isWaitingForResponse) return;

      const userInput = document.getElementById('userInput');
      const messagesDiv = document.getElementById('messages');
      
      const message = userInput.value.trim();
      if (!message) return;

      // Display user message
      addMessage(message, 'user-message');
      userInput.value = '';
      userInput.focus();

      isWaitingForResponse = true;

      // Show typing indicator
      const typingId = addTypingIndicator();

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        
        // Remove typing indicator
        removeTypingIndicator(typingId);
        
        addMessage(data.reply, 'bot-message');
      } catch (error) {
        removeTypingIndicator(typingId);
        addMessage('Sorry, I encountered an error. Please try again.', 'bot-message');
        console.error(error);
      } finally {
        isWaitingForResponse = false;
      }
    }

    function addMessage(text, className) {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${className}`;
      
      const contentEl = document.createElement('div');
      contentEl.className = 'message-content';
      contentEl.textContent = text;
      
      messageEl.appendChild(contentEl);
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      
      return messageEl;
    }

    function addTypingIndicator() {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = 'message bot-message';
      messageEl.id = 'typing-indicator';
      
      const typingEl = document.createElement('div');
      typingEl.className = 'bot-typing';
      typingEl.innerHTML = '<span></span><span></span><span></span>';
      
      messageEl.appendChild(typingEl);
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      
      return messageEl;
    }

    function removeTypingIndicator(element) {
      if (element && element.parentNode) {
        element.parentNode.removeChild(element);
      }
    }

    // Send on Enter key
    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !isWaitingForResponse) {
        sendMessage();
      }
    });

    // Greeting on load
    window.addEventListener('load', () => {
      addMessage('👋 Hello! I\'m the RSCE Assistant. Ask me anything about our services, membership, resources, or anything else. How can I help?', 'bot-message');
    });
  </script>
</body>
</html>
